---
layout: default
---
<article class="post">
  <header class="post__head">
    <p class="post__kicker"><a href="{{ '/blog/' | relative_url }}">← Stuff I Said</a></p>
    <h1 class="post__title">{{ page.title }}</h1>
    {% if page.summary %}
      <p class="post__summary">{{ page.summary }}</p>
    {% endif %}
  </header>

  <div class="post__body">
    {{ content }}
  </div>

  <footer class="post__foot">
    <a href="{{ '/blog/' | relative_url }}" class="post__back">← Back to everything</a>
  </footer>
</article>
