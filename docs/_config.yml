title: Wikipedia Brown
description: >-
  Wikipedia Brown is a software engineer. I build
  cloud-based Mac environments on Apple Silicon: continuous integration and delivery,
  mobile device management, machine learning, virtual desktops, and computer-using
  agents. After hours I ship iOS apps, macOS tools, and open-source Swift.
url: "https://wikipediabrown.dev"
author: Wikipedia Brown

# Posts live under /blog/<slug>/ rather than the default /YYYY/MM/DD/<slug>/.
# Keeps dates out of URLs (per user preference — no dates anywhere).
permalink: /blog/:slug/

# GitHub Pages's safe default plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Don't process the raw HTML site source files Jekyll doesn't need to touch.
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
