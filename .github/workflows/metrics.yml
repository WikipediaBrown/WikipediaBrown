name: metrics

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "github-metrics.svg"
      - ".github/workflows/metrics.yml"

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: WikipediaBrown
          filename: github-metrics.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore: refresh github-metrics.svg [skip ci]"

          base: header, activity, repositories, metadata
          repositories_affiliations: owner
          config_timezone: America/Los_Angeles
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_calendar: yes
          plugin_calendar_limit: 1
          plugin_lines: yes
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 0

          config_display: large
          config_animations: yes
          extras_css: >
            :root { color-scheme: dark; }
            .background, body, svg { background:#0B0C0E !important; fill:#0B0C0E !important; }
            text, tspan, .field, .value, td, th, p, span { fill:#ECEDEA !important; color:#ECEDEA !important; }
            .title, h2, .header .name, .key, strong, b { fill:#00F2B0 !important; color:#00F2B0 !important; }
            a { color:#00F2B0 !important; }
            .header .position, .meta, small, .muted { fill:#A4A6A1 !important; color:#A4A6A1 !important; }
            rect[stroke], .frame { stroke:rgba(255,255,255,.09) !important; }
